<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transform CSS</title>
    <style>
        .transform{
            transform: scaleZ(1.7);
            background-color: aliceblue;
            padding:20px;
            border:2px solid red;
        }
    </style>
</head>

<body>
    <div class="transform">
        In CSS, transformations are used to modify the appearance of an element by applying various
        operations. Here are some examples of common transformation functions used in CSS:
    </div>
</body>

</html>

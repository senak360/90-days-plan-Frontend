<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

</head>

<body>
    <canvas id="myCanvas" width="350px" height="200px"></canvas>
</body>
<script>
    var c = document.getElementById("myCanvas");
    var e = c.getContext("2d");
    e.fillStyle = "red";
    e.fillRect(20, 20, 150, 100);
</script>

</html>
